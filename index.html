<!doctype html>
<html lang="zh-TW">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --ink: #000000;
        --paper: #f5ede0;
        --gold: #c8922a;
        --red: #8b1a1a;
        --muted: #7a6a54;
      }

      html,
      body {
        height: 100dvh;
        max-height: 100dvh;
        overflow: hidden;
        background: var(--ink);
        color: var(--paper);
        font-family: "Noto Serif TC", serif;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #app-screen:not([hidden]) {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: 100dvh;
        max-height: 100dvh;
        overflow: hidden;
      }

      /* ── Login overlay ── */
      #login-screen {
        position: fixed;
        inset: 0;
        max-height: 100dvh;
        overflow-y: auto;
        background: var(--ink);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 1000;
      }
      #login-screen h1 {
        font-size: 2rem;
        letter-spacing: 0.2em;
        color: var(--gold);
      }
      #login-screen p {
        font-size: 0.85rem;
        color: var(--muted);
        letter-spacing: 0.05em;
      }
      .login-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 300px;
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        transition:
          max-height 0.35s ease,
          opacity 0.25s ease;
      }
      .login-box.expanded {
        max-height: 280px;
        opacity: 1;
      }
      .login-box input {
        background: #2a1e0e;
        border: 1px solid #5a4a30;
        color: var(--paper);
        font-family: inherit;
        font-size: 0.85rem;
        padding: 10px 14px;
        border-radius: 2px;
        outline: none;
        transition: border-color 0.18s;
      }
      .login-box input:focus {
        border-color: var(--gold);
      }
      .login-box input::placeholder {
        color: var(--muted);
      }
      .login-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 0.75rem;
      }
      .login-divider::before,
      .login-divider::after {
        content: "";
        flex: 1;
        border-top: 1px solid #3a2e1e;
      }
      .login-alt {
        width: 300px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      /* ── Header ── */
      header {
        flex-shrink: 0;
        width: 100%;
        max-width: 900px;
        padding: 12px 24px 0;
        display: flex;
        align-items: baseline;
        gap: 14px;
      }
      header h1 {
        font-size: clamp(1.3rem, 3.5vw, 1.8rem);
        font-weight: 700;
        letter-spacing: 0.15em;
        color: var(--gold);
        flex: 1;
      }
      #user-info {
        font-size: 0.75rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #user-info span {
        color: var(--paper);
      }

      hr.div {
        flex-shrink: 0;
        width: calc(100% - 48px);
        max-width: 900px;
        margin: 8px 0 10px;
        border: none;
        border-top: 1px solid #3a2e1e;
      }

      /* ── Emulator ── */
      #dos-wrapper {
        flex: 1 1 0;
        min-height: 0;
        width: 100%;
        max-width: 900px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        container-type: size;
      }
      #dos {
        aspect-ratio: 4 / 3;
        width: min(100cqw, calc(100cqh * 4 / 3));
        max-height: 100cqh;
      }

      /* 隱藏 js-dos 內建玩家 UI（側邊欄、存檔 icon 等），避免與「儲存進度」混淆 */
      #dos .side-bar,
      #dos [class*="sidebar"],
      #dos [class*="Sidebar"] {
        display: none !important;
      }

      /* ── Controls ── */
      .controls {
        flex-shrink: 0;
        width: 100%;
        max-width: 900px;
        padding: 8px 24px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        background: transparent;
        border: 1px solid var(--muted);
        color: var(--paper);
        font-family: inherit;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        padding: 6px 16px;
        border-radius: 2px;
        cursor: pointer;
        transition:
          border-color 0.18s,
          color 0.18s,
          background 0.18s;
      }
      .btn-icon {
        width: 1.05em;
        height: 1.05em;
        flex-shrink: 0;
      }
      .btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      .btn:active {
        opacity: 0.7;
      }
      .btn.primary {
        border-color: var(--gold);
        color: var(--gold);
      }
      .btn.primary:hover {
        background: var(--gold);
        color: var(--ink);
      }
      .btn.danger {
        border-color: #5a2020;
        color: #c07070;
      }
      .btn.danger:hover {
        border-color: var(--red);
        color: #e08080;
      }

      .ctrl-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ctrl-label {
        font-size: 0.68rem;
        letter-spacing: 0.12em;
        color: var(--muted);
        white-space: nowrap;
        padding-right: 4px;
      }
      .ctrl-divider {
        width: 1px;
        height: 28px;
        background: #3a2e1e;
        margin: 0 4px;
      }

      /* ── Tips ── */
      .tips {
        flex-shrink: 1;
        min-height: 0;
        overflow-y: auto;
        width: 100%;
        max-width: 900px;
        padding: 2px 24px 10px;
      }
      .tips h2 {
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .tips ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .tips li {
        font-size: 0.8rem;
        color: #a09080;
        line-height: 1.6;
      }
      .tips li::before {
        content: "— ";
        color: var(--gold);
      }

      /* ── SweetAlert2 主題覆寫 ── */
      .swal-gold {
        --swal2-background: #1a1008;
        --swal2-color: #f5ede0;
        --swal2-border-radius: 4px;
      }
      .swal2-popup.swal-gold {
        background: #1e140a;
        color: #f5ede0;
        border: 1px solid #3a2e1e;
        font-family: "Noto Serif TC", serif;
      }
      .swal2-popup.swal-gold .swal2-title {
        color: #c8922a;
        letter-spacing: 0.1em;
      }
      .swal2-popup.swal-gold .swal2-html-container {
        color: #a09080;
      }
      .swal2-popup.swal-gold .swal2-confirm {
        background: transparent !important;
        border: 1px solid #c8922a !important;
        color: #c8922a !important;
        font-family: inherit !important;
        letter-spacing: 0.08em;
        border-radius: 2px !important;
        box-shadow: none !important;
      }
      .swal2-popup.swal-gold .swal2-confirm:hover {
        background: #c8922a !important;
        color: #1a1008 !important;
      }
      .swal2-popup.swal-gold .swal2-cancel {
        background: transparent !important;
        border: 1px solid #5a4a30 !important;
        color: #7a6a54 !important;
        font-family: inherit !important;
        letter-spacing: 0.08em;
        border-radius: 2px !important;
        box-shadow: none !important;
      }
      .swal2-popup.swal-gold .swal2-cancel:hover {
        border-color: #7a6a54 !important;
        color: #f5ede0 !important;
      }
      .swal2-popup.swal-gold .swal-actions {
        gap: 16px !important;
      }
      .swal2-popup.swal-gold .swal-actions .swal2-styled {
        margin: 0 !important;
        padding: 8px 22px !important;
      }
      .swal2-popup.swal-gold.swal2-icon-warning .swal2-icon {
        border-color: #c8922a !important;
        color: #c8922a !important;
      }
      .swal2-popup.swal-gold.swal2-icon-success .swal2-icon {
        border-color: #4a7a4a !important;
        color: #4a7a4a !important;
      }
      .swal2-popup.swal-gold.swal2-icon-error .swal2-icon {
        border-color: #8b1a1a !important;
        color: #8b1a1a !important;
      }
    </style>
  </head>
  <body>
    <!-- ── 登入畫面 ── -->
    <div id="login-screen">
      <div><h1>金庸群俠傳</h1></div>
      <p>登入後可跨裝置保存遊戲進度</p>
      <button class="btn primary" onclick="googleLogin()" style="width: 300px; padding: 10px">
        <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a7.06 7.06 0 0 1-3.02 4.64v2.77h4.88A11.94 11.94 0 0 0 24 12.25z" />
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-4.88-3.78c-1.36.91-3.1 1.44-5.1 1.44-3.92 0-7.24-2.65-8.43-6.21H1.13v3.89A11.99 11.99 0 0 0 12 23z" />
          <path fill="#FBBC05" d="M3.57 12.47c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V4.4H1.13A11.99 11.99 0 0 0 0 12c0 1.97.47 3.83 1.3 5.47l2.27-3.77z" />
          <path fill="#EA4335" d="M12 4.75c1.62 0 3.08.56 4.23 1.65l3.17-3.17C17.45 1.09 14.97 0 12 0 7.31 0 3.28 2.69 1.13 6.6l2.44 3.89C4.76 6.9 8.08 4.75 12 4.75z" />
        </svg>
        Google 帳號登入

      <div class="login-alt" id="email-login-trigger">
        <div class="login-divider">或</div>
        <button class="btn primary" type="button" onclick="toggleEmailLogin()" style="width: 100%; padding: 10px">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="2" />

      <div class="login-box" id="email-login-panel">
        <input type="email" id="email" placeholder="電子郵件" autocomplete="email" required />
        <input type="password" id="password" placeholder="密碼（至少 6 碼）" autocomplete="current-password" minlength="6" required />
        <button class="btn primary" onclick="emailLogin()">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
          登入
        </button>
        <button class="btn" onclick="emailRegister()">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          註冊新帳號
        </button>
      </div>
    </div>

    <!-- ── 主畫面 ── -->
    <div id="app-screen" hidden>
      <header>
        <h1>金庸群俠傳</h1>
        <div id="user-info">
          <span id="user-email"></span>
          <button class="btn" onclick="logout()" style="padding: 4px 10px; font-size: 0.72rem">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            登出
          </button>
        </div>
      </header>
      <hr class="div" />

      <div id="dos-wrapper">
        <div id="dos"></div>
      </div>

      <div class="controls">
        <div class="ctrl-group">
          <span class="ctrl-label">遊戲控制</span>
          <button class="btn" onclick="confirmRestart()">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" />
              <polyline points="21 3 21 9 15 9" />

          <button class="btn" onclick="toggleFS()">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8 3H5a2 2 0 0 0-2 2v3" />
              <path d="M21 8V5a2 2 0 0 0-2-2h-3" />
              <path d="M3 16v3a2 2 0 0 0 2 2h3" />
              <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
            </svg>
            全螢幕
          </button>
        </div>
        <div class="ctrl-divider"></div>
        <div class="ctrl-group">
          <span class="ctrl-label">遊戲進度</span>
          <button class="btn primary" onclick="saveGame()">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
            儲存進度
          </button>
          <button class="btn danger" onclick="resetGame()">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              <line x1="10" y1="11" x2="10" y2="17" />
              <line x1="14" y1="11" x2="14" y2="17" />
            </svg>
            重置遊戲
          </button>
        </div>
      </div>

      <div class="tips">
        <h2>操作提示</h2>
        <ul>
          <li>先在遊戲內存檔（遊戲選單），再按「儲存進度」上傳至雲端</li>
          <li>登入時會自動還原雲端存檔，換裝置登入即可繼續</li>
          <li>方向鍵移動，Enter 確認，Esc 取消或開選單</li>
        </ul>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import { getFirestore, doc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAc4w4HiAbt3hmpwTkoszUx4S_Z9Vgtp74",
        authDomain: "dos-game-web-demo-db.firebaseapp.com",
        projectId: "dos-game-web-demo-db",
        storageBucket: "dos-game-web-demo-db.firebasestorage.app",
        messagingSenderId: "1024819654983",
        appId: "1:1024819654983:web:e1863fc0784257b3dc1c62",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const gProvider = new GoogleAuthProvider();
      gProvider.setCustomParameters({ prompt: "select_account" });

      let gameCI = null;
      let dosProps = null;

      // ── SweetAlert2 快捷函式 ──
      const swalBase = {
        customClass: { popup: "swal-gold", actions: "swal-actions" },
        buttonsStyling: false,
        heightAuto: false,
        scrollbarPadding: false,
      };

      const toast = (icon, title) =>
        Swal.fire({
          ...swalBase,
          toast: true,
          position: "top",
          icon,
          title,
          showConfirmButton: false,
          timer: 2800,
          timerProgressBar: true,
        });

      const confirm = (title, text, confirmText = "確定", icon = "warning") =>
        Swal.fire({
          ...swalBase,
          title,
          text,
          icon,
          showCancelButton: true,
          confirmButtonText: confirmText,
          cancelButtonText: "取消",
        }).then((r) => r.isConfirmed);

      const BUNDLE_KEY = "JINYONG.jsdos";
      // Firestore 單一文件上限 1MB，大檔拆成多個 chunk（免費方案可用）
      const CHUNK_BYTES = 600_000;

      // ── js-dos ──
      function initDos() {
        dosProps = Dos(document.getElementById("dos"), {
          url: `./${BUNDLE_KEY}`,
          autoStart: true,
          autoSave: true,
          kiosk: true, // 用來控制dosjs side bar 的顯示與否
          noCloud: true, // 用來控制dosjs 存檔的顯示與否
          theme: "dark",
          renderAspect: "4/3",
          imageRendering: "pixelated",
          onEvent: (event, arg) => {
            if (event === "ci-ready") {
              gameCI = arg;
              toast("success", "遊戲載入完成");
            }
          },
        });
      }

      // ── Auth 狀態監聽 ──
      onAuthStateChanged(auth, async (user) => {
        const loginScreen = document.getElementById("login-screen");
        const appScreen = document.getElementById("app-screen");
        if (user) {
          loginScreen.style.display = "none";
          appScreen.hidden = false;
          document.getElementById("user-email").textContent = user.email || user.displayName;
          if (!dosProps) {
            try {
              const restored = await restoreCloudSave(user.uid);
              if (restored) toast("success", "已還原雲端存檔");
            } catch (e) {
              console.warn("無雲端存檔或還原失敗", e);
            }
            initDos();
          }
        } else {
          loginScreen.style.display = "flex";
          appScreen.hidden = true;
          document.getElementById("user-email").textContent = "";
          if (dosProps) {
            try {
              await dosProps.stop();
            } catch (e) {
              console.warn(e);
            }
          }
          document.getElementById("dos").innerHTML = "";
          dosProps = null;
          gameCI = null;
          resetEmailLoginPanel();
        }
      });

      // ── OPFS / 雲端存檔 ──
      function bytesToBase64(bytes) {
        let binary = "";
        for (let i = 0; i < bytes.length; i += 0x8000) {
          binary += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
        }
        return btoa(binary);
      }

      function base64ToBytes(b64) {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }

      function authErrorMessage(e) {
        const code = e?.code || "";
        if (code === "permission-denied") {
          return "Firestore 權限不足，請至 Firebase Console 設定安全規則（見 firestore.rules）";
        }
        if (code === "unavailable") return "無法連線 Firestore，請稍後再試";
        return e.message;
      }

      async function writeChangesToOPFS(bytes) {
        const root = await navigator.storage.getDirectory();
        const jsdos = await root.getDirectoryHandle("jsdos", { create: true });
        const file = await jsdos.getFileHandle(`${BUNDLE_KEY}.changes`, { create: true });
        const w = await file.createWritable();
        await w.write(bytes);
        await w.close();
      }

      async function getChangesBytes() {
        await dosProps.save();

        for (const key of [BUNDLE_KEY, `./${BUNDLE_KEY}`]) {
          const changes = await dosProps.getLocalChanges(key);
          if (changes?.length) return changes;
        }

        try {
          const root = await navigator.storage.getDirectory();
          const jsdos = await root.getDirectoryHandle("jsdos");
          const file = await jsdos.getFileHandle(`${BUNDLE_KEY}.changes`);
          const buf = await (await file.getFile()).arrayBuffer();
          return new Uint8Array(buf);
        } catch (opfsErr) {
          if (gameCI?.persist) {
            const bundle = await gameCI.persist(true);
            if (bundle?.length) return new Uint8Array(bundle);
          }
          throw opfsErr;
        }
      }

      async function saveChunksToFirestore(uid, bytes) {
        const chunkCount = Math.ceil(bytes.length / CHUNK_BYTES);
        const metaSnap = await getDoc(doc(db, "saves", uid));
        const oldCount = metaSnap.data()?.chunkCount || 0;
        const batch = writeBatch(db);

        for (let i = 0; i < chunkCount; i++) {
          const start = i * CHUNK_BYTES;
          const slice = bytes.subarray(start, Math.min(start + CHUNK_BYTES, bytes.length));
          batch.set(doc(db, "saves", uid, "chunks", String(i)), { data: bytesToBase64(slice) });
        }
        for (let i = chunkCount; i < oldCount; i++) {
          batch.delete(doc(db, "saves", uid, "chunks", String(i)));
        }
        batch.set(doc(db, "saves", uid), {
          version: 3,
          chunkCount,
          size: bytes.length,
          savedAt: new Date().toISOString(),
        });
        await batch.commit();
      }

      async function loadChunksFromFirestore(uid, chunkCount) {
        const parts = [];
        for (let i = 0; i < chunkCount; i++) {
          const snap = await getDoc(doc(db, "saves", uid, "chunks", String(i)));
          if (!snap.exists()) throw new Error(`缺少存檔區塊 ${i + 1}/${chunkCount}`);
          parts.push(base64ToBytes(snap.data().data));
        }
        const out = new Uint8Array(parts.reduce((sum, p) => sum + p.length, 0));
        let offset = 0;
        for (const part of parts) {
          out.set(part, offset);
          offset += part.length;
        }
        return out;
      }

      async function restoreCloudSave(uid) {
        const snap = await getDoc(doc(db, "saves", uid));
        if (!snap.exists()) return false;

        const data = snap.data();

        if (data.chunkCount) {
          const bytes = await loadChunksFromFirestore(uid, data.chunkCount);
          await writeChangesToOPFS(bytes);
          return true;
        }

        if (data.storagePath) {
          console.warn("舊版 Storage 存檔無法在免費方案還原，請重新儲存一次");
          return false;
        }

        if (data.changes) {
          await writeChangesToOPFS(base64ToBytes(data.changes));
          return true;
        }

        return false;
      }

      // ── 儲存進度 ──
      window.saveGame = async () => {
        if (!auth.currentUser) {
          toast("error", "請先登入");
          return;
        }
        if (!dosProps) {
          toast("error", "遊戲尚未載入完成");
          return;
        }
        toast("info", "儲存中...");
        try {
          const bytes = await getChangesBytes();
          await saveChunksToFirestore(auth.currentUser.uid, bytes);
          toast("success", "進度已儲存至雲端");
        } catch (e) {
          console.error(e);
          if (e?.name === "NotFoundError") {
            toast("warning", "尚無遊戲進度可儲存，請先在遊戲內存檔");
            return;
          }
          toast("error", "儲存失敗：" + authErrorMessage(e));
        }
      };

      // ── 重新啟動（確認）──
      window.confirmRestart = async () => {
        const ok = await confirm("重新啟動遊戲？", "遊戲將重新載入，未儲存的進度會遺失。", "重新啟動");
        if (ok) location.reload();
      };

      // ── 重置遊戲（確認）──
      window.resetGame = async () => {
        const ok = await confirm("重置遊戲？", "本機存檔將清除，回到初始狀態。\n雲端存檔不受影響。", "確定重置");
        if (!ok) return;
        if (document.fullscreenElement) {
          try {
            await document.exitFullscreen();
          } catch (e) {
            console.warn(e);
          }
        }
        await dosProps?.stop();
        document.getElementById("dos").innerHTML = "";
        dosProps = null;
        gameCI = null;
        const root = await navigator.storage.getDirectory();
        const jsdos = await root.getDirectoryHandle("jsdos").catch(() => null);
        if (jsdos) await jsdos.removeEntry(`${BUNDLE_KEY}.changes`).catch(() => {});
        toast("success", "已重置，重新載入中...");
        setTimeout(() => location.reload(), 1200);
      };

      // ── 登出（確認）──
      window.logout = async () => {
        const ok = await confirm("確定要登出？", "你存檔了嗎？ 若還沒存檔，將會遺失進度", "登出", "question");
        if (!ok) return;
        if (document.fullscreenElement) {
          try {
            await document.exitFullscreen();
          } catch (e) {
            console.warn(e);
          }
        }
        await signOut(auth);
      };

      // ── 登入 ──
      function resetEmailLoginPanel() {
        document.getElementById("email-login-panel").classList.remove("expanded");
        document.getElementById("email-login-trigger").hidden = false;
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
      }

      window.toggleEmailLogin = () => {
        document.getElementById("email-login-trigger").hidden = true;
        document.getElementById("email-login-panel").classList.add("expanded");
        setTimeout(() => document.getElementById("email").focus(), 300);
      };

      window.googleLogin = () => signInWithPopup(auth, gProvider).catch((e) => toast("error", e.message));

      function validateCredentials(email, password) {
        if (!email) return "請輸入電子郵件";
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) return "電子郵件格式不正確";
        if (!password) return "請輸入密碼";
        if (password.length < 6) return "密碼至少需要 6 個字元";
        if (password.length > 128) return "密碼不可超過 128 個字元";
        if (/\s/.test(password)) return "密碼不可包含空白字元";
        return null;
      }

      window.emailLogin = () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const err = validateCredentials(email, password);
        if (err) return toast("error", err);
        signInWithEmailAndPassword(auth, email, password).catch((e) => toast("error", "登入失敗：" + e.message));
      };

      window.emailRegister = () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const err = validateCredentials(email, password);
        if (err) return toast("error", err);
        createUserWithEmailAndPassword(auth, email, password).catch((e) => toast("error", "註冊失敗：" + e.message));
      };

      // ── 全螢幕 ──
      window.toggleFS = () => {
        dosProps?.setFullScreen(!document.fullscreenElement);
      };
    </script>

    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  </body>
</html>
